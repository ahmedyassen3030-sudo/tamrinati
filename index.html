*{margin:0;padding:0;box-sizing:border-box;font-family:'IBM Plex Sans','IBM Plex Sans Arabic',sans-serif}
body{background:#DEDEDE;color:#0f172a;min-height:100vh;direction:rtl}
#ap{max-width:480px;margin:0 auto;min-height:100vh;background:#DEDEDE}
.btn{width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;font-weight:700;font-size:15px;margin-bottom:8px;transition:opacity .15s;font-family:'IBM Plex Sans','IBM Plex Sans Arabic',sans-serif}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px;margin-bottom:10px}
.tag{display:inline-flex;flex-direction:column;align-items:center;gap:8px;padding:14px 12px 10px;border-radius:14px;font-size:12px;margin:4px;background:#fff;border:1px solid #e2e8f0;color:#ea580c;min-width:100px;font-weight:600}
.row{display:flex;align-items:center;gap:8px}
.muted{color:#64748b;font-size:12px}
.tip{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);border-radius:10px;padding:10px;margin-top:8px;font-size:13px;color:#c2410c}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.fi{animation:fi .3s ease-out}
@keyframes celebrate-fade{0%{opacity:0}10%{opacity:1}85%{opacity:1}100%{opacity:0}}
@keyframes celebrate-slide{from{transform:translateX(-110vw)}to{transform:translateX(110vw)}}
.celebrate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:9999;overflow:hidden;background:rgba(255,255,255,.5);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);animation:celebrate-fade 1.6s ease-in-out forwards}
.celebrate-text{font-size:26vw;font-weight:900;color:#f97316;white-space:nowrap;animation:celebrate-slide 1.6s ease-in-out forwards;letter-spacing:-1.5px;line-height:1}
body.dark .celebrate{background:rgba(15,23,42,.5)}
body.dark .celebrate-text{color:#fb923c}
body.dark{background:#0f172a;color:#f1f5f9}
body.dark #ap{background:#0f172a}

body.dark .muted{color:#94a3b8}
body.dark .tag{background:#1e293b;border-color:#334155}
body.dark .tip{background:rgba(251,146,60,.12);border-color:rgba(251,146,60,.25);color:#fdba74}
body.dark .bs{background:#334155;color:#cbd5e1}

.set-pulse::before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 25%,rgba(255,255,255,.35) 50%,transparent 75%);background-size:220% 100%;animation:shimmer 1.8s linear infinite;pointer-events:none;z-index:1}

        const skipBtn=`<button id="bskip" style="background:#cbd5e1;border:none;color:#334155;font-size:11px;padding:7px 11px;border-radius:8px;cursor:pointer;font-family:'IBM Plex Sans','IBM Plex Sans Arabic',sans-serif;font-weight:600;flex-shrink:0;white-space:nowrap">تخطي للتمرين ←</button>`;
        if(!nx)return `<div style="background:transparent;border:1.5px solid #475569;border-radius:14px;padding:12px;margin-top:12px;display:flex;align-items:center;gap:10px"><div style="width:50px;height:50px;border-radius:10px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🧘</div><div style="flex:1;min-width:0;text-align:right"><div class="muted" style="font-size:10px;margin-bottom:2px">التالي</div><div style="font-size:14px;font-weight:600;color:#0f172a">التهدئة والإطالات</div></div>${skipBtn}</div>`;
        return `<div style="background:transparent;border:1.5px solid #475569;border-radius:14px;padding:12px;margin-top:12px;display:flex;align-items:center;gap:10px">${nx.gif?`<img src="${nx.gif}" alt="${nx.n}" style="width:50px;height:50px;border-radius:10px;object-fit:cover;background:#f1f5f9;flex-shrink:0;border:2px solid #fff"/>`:`<div style="width:50px;height:50px;border-radius:10px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">💪</div>`}<div style="flex:1;min-width:0;text-align:right"><div class="muted" style="font-size:10px;margin-bottom:2px">التمرين التالي</div><div style="font-size:14px;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nx.n}</div><div class="muted" style="font-size:11px;margin-top:2px">${nx.s}×${nx.isTm?Math.floor(nx.dur/60)+'د':nx.r}</div></div>${skipBtn}</div>`;
      })()}
    </div>`);
  $('bk').addEventListener('click',()=>{if(ST.ei===0)showWarmup();else{ST.ei--;ST.set=1;showMain();}});
  $('btoggle').addEventListener('click',()=>{const det=$('det'),m=$('exmain'),b=$('btoggle');if(det.style.display==='none'){det.style.display='block';m.style.display='none';b.textContent='▲ إخفاء التعليمات';}else{det.style.display='none';m.style.display='block';b.textContent='▼ عرض طريقة الأداء';}});
  const bew=$('bEditW');if(bew)bew.addEventListener('click',(e)=>{e.stopPropagation();const cur=getExWeight(ex);const parsed=parseWeight(cur);const v=prompt('الوزن (رقم فقط):',parsed.num);if(v!==null&&v.trim()){const newW=parsed.label?`${v.trim()} ${parsed.label}`:v.trim();setExWeight(ex.id,newW);showMain();}});
  if(ex.isTm){
    $('bdone').addEventListener('click',()=>{$('bdone').textContent='⏳ شغّال...';startTm(ex.dur,d.c,()=>{celebrate('عاااااااااااااش',()=>{if(ST.set<ex.s)showRest();else nextEx();});});});
  }else{
    $('bdone').addEventListener('click',()=>{celebrate('عاااااااااااااش',()=>{if(ST.set<ex.s)showRest();else nextEx();});});
  }
  $('bskip').addEventListener('click',nextEx);
}

function nextEx(){const d=ST.day;if(ST.ei<d.ex.length-1){ST.ei++;ST.set=1;showMain();}else showCooldown();}

function showRest(){
  const d=ST.day,ex=d.ex[ST.ei];
  render(`<div style="padding:16px;text-align:center">
    <div style="font-size:14px;font-weight:700;margin-bottom:4px">${ex.n}</div>
    <div class="muted" style="margin-bottom:4px">المجموعة ${ST.set} من ${ex.s}</div>
    <div class="muted" style="margin-bottom:8px">⏳ راحة بين المجموعات</div>
    ${tmrHTML(d.c)}
    <button class="btn bs" id="bskip" style="margin-top:8px">تخطي الراحة →</button>
  </div>`);
  const after=()=>{ST.set++;showMain();};
  startTm(ex.rest,d.c,after);
  $('bskip').addEventListener('click',()=>{stopTm();after();});
}

function showCooldown(){
  const d=ST.day,i=ST.ci,item=d.cd[i],isLast=i===d.cd.length-1;
  const dots=d.cd.map((_,j)=>`<div style="width:30px;height:4px;border-radius:3px;background:${j<=i?COL.b:'#94a3b8'}"></div>`).join('');
  render(`<div style="padding:16px">
    <div class="row" style="justify-content:space-between;margin-bottom:14px">
      <button class="btn bs" id="bk" style="width:auto;padding:8px 16px;font-size:14px">← رجوع</button>
      <div style="display:flex;gap:4px">${dots}</div>
    </div>
    <div style="text-align:center">
      <div class="muted" style="margin-bottom:4px">🧘 التهدئة</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">${item.n}</div>
      ${item.gif?`<img src="${item.gif}" alt="${item.n}" style="width:100%;max-width:360px;border-radius:14px;margin:8px auto;display:block;background:#f1f5f9;border:3px solid #fff"/>`:''}
      <div style="font-size:13px;color:#64748b;margin-bottom:12px;line-height:1.6;padding:0 4px">${item.ins}</div>
      ${tmrHTML('b')}
      <button class="btn bb" id="bgo" style="margin-top:8px">ابدأ ▶</button>
      <button class="btn bs" id="bnx" style="display:none">${isLast?'إنهاء الجلسة 🎉':'التالي →'}</button>
    </div>
  </div>`);
  $('bk').addEventListener('click',()=>{if(i===0)showMain();else{ST.ci--;showCooldown();}});
  $('bgo').addEventListener('click',()=>{$('bgo').style.display='none';$('bnx').style.display='block';startTm(item.d,'b',()=>$('bnx').click());});
  $('bnx').addEventListener('click',()=>{if(isLast)showDone();else{ST.ci++;showCooldown();}});
  if(i>0)$('bgo').click();
}

function showDone(){
  const d=ST.day;
  if(!ST.done.includes(d.id)){ST.done.push(d.id);saveST();}
  stopSw();
  const totalTime=fmtTime(Math.floor((Date.now()-ST.sessionStart)/1000));
  const msgs=['أداء رائع! 💪','عمل ممتاز! 🔥','خطوة للأمام! ⭐'];
  render(`<div style="padding:16px;text-align:center">
    <div style="font-size:72px;margin-bottom:12px">🏆</div>
    <div style="font-size:22px;font-weight:900;margin-bottom:4px">${msgs[Math.floor(Math.random()*3)]}</div>
    <div class="muted" style="margin-bottom:10px">أنهيت ${d.name} — ${d.tl}</div>
    <div style="display:inline-block;background:#f1f5f9;border-radius:12px;padding:10px 18px;margin-bottom:16px"><div style="font-size:11px;color:#64748b">⏱️ وقت الجلسة الكامل</div><div style="font-size:24px;font-weight:900;color:#f97316">${totalTime}</div></div>
    <div class="card" style="text-align:right;margin-bottom:16px">
      <div class="muted" style="font-weight:700;margin-bottom:10px">تذكّر بعد التمرين:</div>
      ${[['🍗','تناول وجبة بروتين خلال ساعة من التمرين'],['💧','اشرب ماء كافي — على الأقل 2 لتر'],['😴','نام كويس — العضل بيبنى في النوم'],['🍚','زود وجباتك — الأكل هو الأهم لك']].map(([ic,tx])=>`<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start"><span style="font-size:16px">${ic}</span><span style="font-size:13px;color:#334155;line-height:1.5">${tx}</span></div>`).join('')}
    </div>
    <button class="btn bo" id="bhome">رجوع للرئيسية</button>
  </div>`);
  $('bhome').addEventListener('click',showHome);
}

applyTheme();
showHome();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
